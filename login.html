<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1222" />
    <title>Sign in — Hours Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>" />

    <!-- SOMA Auth (order matters: Supabase CDN, then config, then runtime). -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/soma-auth-config.js"></script>
    <script src="js/soma-auth.js"></script>

    <link rel="stylesheet" href="/vendor/soma-feedback/soma-feedback.css" />

    <style>
      :root {
        --bg: #0f1222;
        --bg-2: #171a30;
        --panel: #1c2038;
        --border: #2c3157;
        --text: #e8eaf6;
        --muted: #9aa0c8;
        --accent: #7c83ff;
        --accent-2: #4dd6a8;
        --danger: #ff6b7a;
        --shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: radial-gradient(1200px 600px at 80% -10%, #1a1f3d 0%, var(--bg) 55%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        line-height: 1.5;
      }
      .card {
        width: 100%;
        max-width: 400px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 30px 28px 26px;
        box-shadow: var(--shadow);
      }
      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 700;
      }
      h1 { margin: 6px 0 4px; font-size: 22px; }
      .sub { margin: 0 0 22px; color: var(--muted); font-size: 13px; }

      label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
      input {
        width: 100%;
        background: var(--bg-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
        font-family: inherit;
      }
      input:focus { outline: 2px solid var(--accent); border-color: transparent; }

      button {
        font-family: inherit; font-size: 14px; font-weight: 600;
        border-radius: 10px; padding: 11px 16px; border: 1px solid transparent;
        cursor: pointer; width: 100%; margin-top: 14px;
        transition: filter 0.12s ease;
      }
      button.primary { background: var(--accent); color: #fff; }
      button.primary:hover { filter: brightness(1.1); }
      button.google {
        background: #fff; color: #3c4043; border-color: #dadce0;
        display: flex; align-items: center; justify-content: center; gap: 10px;
      }
      button.google:hover { filter: brightness(0.97); }
      button:disabled { opacity: 0.6; cursor: default; }

      .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 4px; color: var(--muted); font-size: 12px; }
      .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

      .toggle { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
      .toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
      .toggle a:hover { text-decoration: underline; }

      .msg { margin-top: 14px; font-size: 13px; border-radius: 10px; padding: 10px 12px; display: none; }
      .msg.ok { display: block; background: rgba(77, 214, 168, 0.12); color: var(--accent-2); border: 1px solid rgba(77, 214, 168, 0.3); }
      .msg.err { display: block; background: rgba(255, 107, 122, 0.1); color: var(--danger); border: 1px solid rgba(255, 107, 122, 0.3); }

      .foot { margin-top: 20px; text-align: center; color: var(--muted); font-size: 11px; }
      .pw-row { display: none; }
      .pw-row.show { display: block; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="eyebrow">SOMA · Playmaker</div>
      <h1>Hours Dashboard</h1>
      <p class="sub">Sign in to view and log hours. Access is restricted.</p>

      <!-- OAuth -->
      <div id="oauth-slot"></div>

      <div class="divider" id="divider">or</div>

      <!-- Email -->
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />

      <!-- Password (only when password mode is active) -->
      <div class="pw-row" id="pw-row">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="primary" id="primary-btn">Send magic link</button>

      <div class="toggle" id="mode-toggle"></div>

      <div class="msg" id="msg"></div>

      <div class="foot">Protected by SOMA Auth · magic link never expires your session unexpectedly.</div>
    </div>

    <script>
      (function () {
        var q = new URLSearchParams(location.search);
        // Where to land after sign-in. Default to index.html in the same directory
        // as this login page. Never bounce back to login.html itself.
        var baseDir = location.href.replace(/login\.html.*$/, "");
        var redirect = q.get("redirect");
        var appUrl;
        if (redirect && !/login\.html/.test(redirect)) {
          appUrl = new URL(redirect, baseDir).href; // resolves "/index.html", "/", etc.
        } else {
          appUrl = baseDir + "index.html";
        }

        var methods = SomaAuth.getMethods();
        var el = function (id) { return document.getElementById(id); };
        var msg = el("msg");
        var emailInput = el("email");
        var pwRow = el("pw-row");
        var pwInput = el("password");
        var primaryBtn = el("primary-btn");
        var modeToggle = el("mode-toggle");

        function showMsg(text, kind) {
          msg.textContent = text;
          msg.className = "msg " + (kind || "ok");
        }

        // ---- OAuth buttons ----
        if (methods.oauth && methods.oauth.length) {
          methods.oauth.forEach(function (provider) {
            var meta = SomaAuth.providerMeta(provider);
            var b = document.createElement("button");
            b.className = "google";
            b.textContent = "Continue with " + meta.label;
            b.addEventListener("click", function () {
              SomaAuth.signInWithOAuth(provider, { redirectTo: appUrl }).then(function (r) {
                if (r && r.error) showMsg(r.error.message, "err");
              });
            });
            el("oauth-slot").appendChild(b);
          });
        } else {
          el("divider").style.display = "none";
        }

        // ---- Mode: 'magic' (default) or 'password' ----
        var mode = "magic";
        function renderMode() {
          if (mode === "password") {
            pwRow.classList.add("show");
            primaryBtn.textContent = "Sign in";
            modeToggle.innerHTML =
              'Prefer a link? <a id="to-magic">Email me a magic link</a>';
          } else {
            pwRow.classList.remove("show");
            primaryBtn.textContent = "Send magic link";
            if (methods.password) {
              modeToggle.innerHTML = 'Have a password? <a id="to-pw">Sign in with password</a>';
            } else {
              modeToggle.innerHTML = "";
            }
          }
          var toPw = el("to-pw"), toMagic = el("to-magic");
          if (toPw) toPw.addEventListener("click", function () { mode = "password"; renderMode(); });
          if (toMagic) toMagic.addEventListener("click", function () { mode = "magic"; renderMode(); });
        }
        renderMode();

        // ---- Submit ----
        primaryBtn.addEventListener("click", function () {
          var email = emailInput.value.trim();
          if (!email) { showMsg("Enter your email.", "err"); return; }
          primaryBtn.disabled = true;

          if (mode === "password") {
            SomaAuth.signInWithPassword(email, pwInput.value).then(function (r) {
              primaryBtn.disabled = false;
              if (r && r.error) { showMsg(r.error.message, "err"); return; }
              location.replace(appUrl);
            });
          } else {
            SomaAuth.signInWithOtp(email, { emailRedirectTo: appUrl }).then(function (r) {
              primaryBtn.disabled = false;
              if (r && r.error) { showMsg(r.error.message, "err"); return; }
              showMsg("Check your email for a sign-in link.", "ok");
            });
          }
        });
        emailInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && mode === "magic") primaryBtn.click();
        });
        pwInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") primaryBtn.click();
        });

        // If already signed in, skip straight to the app.
        SomaAuth.onAuthStateChange(function (event, session) {
          if ((event === "INITIAL_SESSION" || event === "SIGNED_IN") && session && session.user) {
            location.replace(appUrl);
          }
        });
        SomaAuth.init(window.SOMA_AUTH_CONFIG.url, window.SOMA_AUTH_CONFIG.anonKey);
      })();
    </script>

    <!-- SOMA feedback chip (SOMA App Standard §8) -->
    <script
      src="/vendor/soma-feedback/soma-feedback.js"
      data-site="stephanie-hours-dashboard"
      data-area="login"
      data-no-google
      defer
    ></script>
  </body>
</html>
